<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Corps de la tête (forme ovale plus naturelle) -->
  <ellipse cx="10" cy="10" rx="9" ry="7" fill="#bd04f5"/>
  <!-- Museau (partie avant plus pointue) -->
  <ellipse cx="15" cy="10" rx="4" ry="5" fill="#bd04f5"/>
  <!-- Yeux (regard vers la droite) -->
  <circle cx="12" cy="7" r="1.5" fill="#ffffff"/>
  <circle cx="12" cy="13" r="1.5" fill="#ffffff"/>
  <!-- Pupilles -->
  <circle cx="13" cy="7" r="0.8" fill="#000000"/>
  <circle cx="13" cy="13" r="0.8" fill="#000000"/>
  <!-- Narines -->
  <circle cx="16" cy="9" r="0.5" fill="#000000"/>
  <circle cx="16" cy="11" r="0.5" fill="#000000"/>
</svg>